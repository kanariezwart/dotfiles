---
name: Test dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stow:
    name: Test stow packages
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stow
        run: brew install stow

      - name: Test stow packages
        run: make test

  brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Brewfile syntax
        run: |
          brew bundle list --file=install/Brewfile
          echo "Brewfile syntax OK"

  shellcheck:
    name: Lint shell files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint zsh files
        run: |
          shellcheck --shell=bash -x --exclude=SC1091 \
            zsh/.zsh/aliases.zsh \
            zsh/.zsh/aliases-osx.zsh \
            zsh/.zsh/functions.zsh \
            install.sh

  yamllint:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint .github/workflows/

  secrets:
    name: Check for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "password\|token\|secret\|api_key" \
            --include="*.zsh" \
            --include="*.sh" \
            --include="*.conf" .; then
            echo "Possible secrets found!"
            exit 1
          fi
          echo "No secrets found"

  linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stow
        run: sudo apt-get install -y stow

      - name: Test stow packages
        run: make test
