name: Test dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stow:
    name: Test stow packages
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stow
        run: brew install stow

      - name: Test stow packages
        run: make test

  brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Brewfile syntax
        run: |
          brew bundle list --file=install/Brewfile
          echo "Brewfile syntax OK"

  shellcheck:
    name: Lint shell files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint zsh files
        run: |
          shellcheck --shell=bash -x zsh/.zsh/aliases.zsh
          shellcheck --shell=bash -x zsh/.zsh/aliases-osx.zsh
          shellcheck --shell=bash -x zsh/.zsh/functions.zsh
          shellcheck --shell=bash install.sh

  yamllint:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint .github/workflows/

  secrets:
    name: Check for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stow
        run: sudo apt-get install -y stow

      - name: Test stow packages
        run: make test
