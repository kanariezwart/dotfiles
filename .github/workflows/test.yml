name: Test dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # handmatig triggeren

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stow:
    name: Test stow packages
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stow
        run: brew install stow

      - name: Test stow packages
        run: make test

  brewfile:
    name: Validate Brewfile
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add taps
        run: brew tap homebrew/cask-fonts

      - name: Validate Brewfile syntax
        run: |
          brew bundle list --file=install/Brewfile
          echo "Brewfile syntax OK"
